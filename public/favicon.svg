<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1a2e44"/>
  <!-- Clipboard body -->
  <rect x="8" y="9" width="16" height="18" rx="2" fill="#ffffff"/>
  <!-- Clipboard clip top -->
  <rect x="13" y="6" width="6" height="5" rx="1.5" fill="#c9a84c"/>
  <!-- Lines (survey questions) -->
  <rect x="11" y="15" width="10" height="1.5" rx="0.75" fill="#c8d4df"/>
  <rect x="11" y="18.5" width="7" height="1.5" rx="0.75" fill="#c8d4df"/>
  <rect x="11" y="22" width="8.5" height="1.5" rx="0.75" fill="#c8d4df"/>
  <!-- Checkmark dot on first line -->
  <circle cx="11" cy="15.75" r="1" fill="#c9a84c"/>
</svg>
