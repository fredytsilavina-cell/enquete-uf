<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond carré arrondi bleu marine -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="#0D1B2A"/>
  <!-- Plateau du mortarboard -->
  <polygon points="50,18 90,38 50,52 10,38" fill="#C9A84C"/>
  <!-- Ombres plateau -->
  <polygon points="10,38 50,52 50,57 10,43" fill="#a8873a"/>
  <polygon points="90,38 50,52 50,57 90,43" fill="#b8963f"/>
  <!-- Chapeau cylindrique -->
  <ellipse cx="50" cy="57" rx="19" ry="5" fill="#1a3352"/>
  <rect x="31" y="40" width="38" height="18" fill="#1a3352"/>
  <ellipse cx="50" cy="40" rx="19" ry="5" fill="#22416a"/>
  <!-- Cordon -->
  <line x1="90" y1="38" x2="90" y2="58" stroke="#C9A84C" stroke-width="2.5"/>
  <circle cx="90" cy="61" r="4" fill="#C9A84C"/>
  <!-- Pompon -->
  <line x1="90" y1="65" x2="85" y2="75" stroke="#C9A84C" stroke-width="1.5"/>
  <line x1="90" y1="65" x2="90" y2="76" stroke="#C9A84C" stroke-width="1.5"/>
  <line x1="90" y1="65" x2="95" y2="75" stroke="#C9A84C" stroke-width="1.5"/>
</svg>
